<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noktalama İşaretleri Ders Anlatımı</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9; /* Temiz ve kontrastı artıran hafif gri arka plan */
            color: #0f172a; /* Maksimum okunabilirlik için koyu ton */
            line-height: 1.7; /* Satır arası rahat okunma boşluğu */
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .loading-status {
            background-color: #dbeafe;
            border: 2px solid #3b82f6;
            color: #1e40af;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 20px;
            text-align: center;
        }

        /* Noktalama Başlıkları: Tahtadan çok rahat okunması için büyütüldü */
        .section-title {
            font-size: 32px; 
            color: #1e3a8a; /* Net bir lacivert */
            margin-top: 50px;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 4px solid #2563eb;
            display: block;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* Kural Kartları: İçeriğin net ayrışması sağlandı */
        .card {
            background: white;
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-left: 8px solid #2563eb; /* Sol renkli vurgu çizgisi kalınlaştırıldı */
        }

        /* Açıklama Metni: Sınıf ortamı için büyütüldü ve kalınlaştırıldı */
        .rule-text {
            font-size: 24px; 
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .examples-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
        }

        /* Örnek Kutuları */
        .example-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-left: 5px solid #475569;
            padding: 20px 24px;
            border-radius: 8px;
        }

        /* Örnek Etiketi */
        .example-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 6px;
            font-weight: 800;
        }

        /* Örnek Cümleleri */
        .example-text {
            font-size: 20px; 
            color: #1e293b;
            font-style: italic;
            font-weight: 500;
        }

        .error-box {
            background-color: #fef2f2;
            border: 2px solid #ef4444;
            color: #991b1b;
            padding: 25px;
            border-radius: 12px;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .container { padding: 20px 12px; }
            .section-title { font-size: 26px; }
            .card { padding: 20px; }
            .rule-text { font-size: 19px; }
            .example-text { font-size: 17px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <div id="status" class="loading-status">
            🔄 Ders verileri Google içerisinden canlı yükleniyor, lütfen bekleyin...
        </div>

        <div id="content-area">
            </div>

        </div>

    <script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/1K7NQVUcdQD3fq3rJuJLGzgWsVnd3sR-_bEhgFKRhYRw/export?format=csv&gid=0";

        function parseCSV(text) {
            let lines = text.split('\n');
            let result = [];
            let headers = [];
            
            if (lines.length > 0) { headers = splitCSVLine(lines[0]); }
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                let obj = {};
                let currentline = splitCSVLine(lines[i]);
                
                for (let j = 0; j < headers.length; j++) {
                    let headerName = headers[j].trim().replace(/^"|"$/g, '');
                    let cellValue = currentline[j] ? currentline[j].trim().replace(/^"|"$/g, '') : "";
                    obj[headerName] = cellValue;
                }
                result.push(obj);
            }
            return result;
        }

        if(window.location.search.includes('raw=1')) { document.body.style.backgroundColor = '#fff'; }

        function splitCSVLine(line) {
            let arr = [];
            let quote = false;
            let cell = "";
            for (let i = 0; i < line.length; i++) {
                let char = line[i];
                if (char === '"') { quote = !quote; }
                else if (char === ',' && !quote) { arr.push(cell); cell = ""; }
                else { cell += char; }
            }
            arr.push(cell);
            return arr;
        }

        async function loadSheetData() {
            const statusDiv = document.getElementById('status');
            const contentArea = document.getElementById('content-area');
            
            try {
                const response = await fetch(sheetCsvUrl);
                if (!response.ok) throw new Error("Google Sheet dosyasına erişilemedi.");
                
                const dataText = await response.text();
                const rows = parseCSV(dataText);
                
                const groups = {};
                rows.forEach(row => {
                    const noktalamaKey = row['Noktalama'] || row['noktalama'];
                    const metinKey = row['Metin'] || row['metin'];
                    const ornek1Key = row['Örnek1'] || row['ornek1'];
                    const ornek2Key = row['Örnek2'] || row['ornek2'];

                    if (noktalamaKey && metinKey) {
                        if (!groups[noktalamaKey]) { groups[noktalamaKey] = []; }
                        groups[noktalamaKey].push({
                            metin: metinKey,
                            ornek1: ornek1Key,
                            ornek2: ornek2Key
                        });
                    }
                });

                let htmlOutput = "";
                for (const [title, items] of Object.entries(groups)) {
                    htmlOutput += `<h2 class="section-title">📘 ${title} Kullanım Alanları</h2>`;
                    
                    items.forEach(item => {
                        htmlOutput += `
                            <div class="card">
                                <div class="rule-text">📌 ${item.metin}</div>
                                <div class="examples-container">
                        `;
                        
                        if (item.ornek1 && item.ornek1.trim() !== "") {
                            htmlOutput += `
                                <div class="example-box">
                                    <div class="example-label">Örnek 1</div>
                                    <div class="example-text">${item.ornek1}</div>
                                </div>
                            `;
                        }
                        
                        if (item.ornek2 && item.ornek2.trim() !== "") {
                            htmlOutput += `
                                <div class="example-box">
                                    <div class="example-label">Örnek 2</div>
                                    <div class="example-text">${item.ornek2}</div>
                                </div>
                            `;
                        }
                        
                        htmlOutput += `</div></div>`;
                    });
                }

                statusDiv.style.display = "none";
                contentArea.innerHTML = htmlOutput;

            } catch (error) {
                statusDiv.className = "error-box";
                statusDiv.innerHTML = `
                    <h3>⚠️ Veri Çekme Hatası</h3>
                    <p>Lütfen Google Sheet tablonuzun paylaşım ayarlarından "Bağlantıya sahip olan herkes görüntüleyebilir" seçeneğinin aktif olduğunu kontrol edin.</p>
                `;
            }
        }

        window.onload = loadSheetData;
    </script>
</body>
</html>
