<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noktalama İşaretleri Soru Çözümü</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
            color: #0f172a;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .loading-status {
            background-color: #dbeafe;
            border: 2px solid #3b82f6;
            color: #1e40af;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 20px;
            text-align: center;
        }

        .page-title {
            font-size: 32px; 
            color: #1e3a8a;
            margin-top: 20px;
            margin-bottom: 30px;
            padding-bottom: 12px;
            border-bottom: 4px solid #2563eb;
            font-weight: 800;
        }

        .question-card {
            background: white;
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 35px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-left: 8px solid #3b82f6;
        }

        .question-text {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 16px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .option-label:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }

        .option-label input[type="radio"] {
            margin-right: 15px;
            margin-top: 6px;
            transform: scale(1.3);
            cursor: pointer;
        }

        .action-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .check-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .check-btn:hover {
            background-color: #1d4ed8;
        }

        .option-label.correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #14532d !important;
            font-weight: 600;
        }

        .option-label.incorrect {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
        }

        .result-feedback {
            font-size: 18px;
            font-weight: 700;
            display: inline-block;
        }
        .result-feedback.success { color: #16a34a; }
        .result-feedback.danger { color: #dc2626; }

        .error-box {
            background-color: #fef2f2;
            border: 2px solid #ef4444;
            color: #991b1b;
            padding: 25px;
            border-radius: 12px;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .container { padding: 20px 12px; }
            .page-title { font-size: 24px; }
            .question-card { padding: 20px; }
            .question-text { font-size: 18px; }
            .option-label { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="page-title">📝 Noktalama İşaretleri Soru Çözümü</h1>

        <div id="status" class="loading-status">
            🔄 Sorular Google içerisinden canlı yükleniyor, lütfen bekleyin...
        </div>

        <div id="questions-area">
            </div>
    </div>

    <script>
        // Sizin tablonuzun gerçek gid kodu entegre edildi
        const tablonuzunGidKodu = "561113110"; 
        
        // Linkiniz dinamik olarak oluşturuluyor
        const sheetCsvUrl = `https://docs.google.com/spreadsheets/d/1K7NQVUcdQD3fq3rJuJLGzgWsVnd3sR-_bEhgFKRhYRw/export?format=csv&gid=${tablonuzunGidKodu}`;

        // CSV Parser
        function parseCSV(text) {
            let lines = text.split('\n');
            let result = [];
            let headers = [];
            
            if (lines.length > 0) { headers = splitCSVLine(lines[0]); }
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                let obj = {};
                let currentline = splitCSVLine(lines[i]);
                
                for (let j = 0; j < headers.length; j++) {
                    let headerName = headers[j].trim().replace(/^"|"$/g, '');
                    let cellValue = currentline[j] ? currentline[j].trim().replace(/^"|"$/g, '') : "";
                    obj[headerName] = cellValue;
                }
                result.push(obj);
            }
            return result;
        }

        function splitCSVLine(line) {
            let arr = [];
            let quote = false;
            let cell = "";
            for (let i = 0; i < line.length; i++) {
                let char = line[i];
                if (char === '"') { quote = !quote; }
                else if (char === ',' && !quote) { arr.push(cell); cell = ""; }
                else { cell += char; }
            }
            arr.push(cell);
            return arr;
        }

        // Soruları Çeken Ana Fonksiyon
        async function loadQuestions() {
            const statusDiv = document.getElementById('status');
            const questionsArea = document.getElementById('questions-area');
            
            try {
                const response = await fetch(sheetCsvUrl);
                if (!response.ok) throw new Error("Google Sheet soru sayfasına erişilemedi.");
                
                const dataText = await response.text();
                const rows = parseCSV(dataText);
                
                let htmlOutput = "";
                
                rows.forEach((row, index) => {
                    const soru = row['Soru'] || row['soru'];
                    const aSikki = row['A Şıkkı'] || row['A şıkkı'] || row['A'];
                    const bSikki = row['B Şıkkı'] || row['B şıkkı'] || row['B'];
                    const cSikki = row['C Şıkkı'] || row['C şıkkı'] || row['C'];
                    const dSikki = row['D Şıkkı'] || row['D şıkkı'] || row['D'];
                    const eSikki = row['E Şıkkı'] || row['E şıkkı'] || row['E'];
                    const dogruSik = (row['Doğru Şık'] || row['doğru şık'] || row['Doğru']) ? (row['Doğru Şık'] || row['doğru şık'] || row['Doğru']).trim().toUpperCase() : "";

                    if (soru) {
                        htmlOutput += `
                            <div class="question-card" id="q-card-${index}">
                                <div class="question-text">${index + 1}) ${soru}</div>
                                <div class="options-container" id="options-q-${index}">
                                    <label class="option-label" data-ans="A">
                                        <input type="radio" name="question-${index}" value="A"> <strong>A)</strong> &nbsp;${aSikki}
                                    </label>
                                    <label class="option-label" data-ans="B">
                                        <input type="radio" name="question-${index}" value="B"> <strong>B)</strong> &nbsp;${bSikki}
                                    </label>
                                    <label class="option-label" data-ans="C">
                                        <input type="radio" name="question-${index}" value="C"> <strong>C)</strong> &nbsp;${cSikki}
                                    </label>
                                    <label class="option-label" data-ans="D">
                                        <input type="radio" name="question-${index}" value="D"> <strong>D)</strong> &nbsp;${dSikki}
                                    </label>
                                    <label class="option-label" data-ans="E">
                                        <input type="radio" name="question-${index}" value="E"> <strong>E)</strong> &nbsp;${eSikki}
                                    </label>
                                </div>
                                <div class="action-container">
                                    <button class="check-btn" onclick="checkAnswer(${index}, '${dogruSik}')">Cevabı Kontrol Et</button>
                                    <div id="feedback-${index}" class="result-feedback"></div>
                                </div>
                            </div>
                        `;
                    }
                });

                statusDiv.style.display = "none";
                questionsArea.innerHTML = htmlOutput;

            } catch (error) {
                statusDiv.className = "error-box";
                statusDiv.innerHTML = `
                    <h3>⚠️ Sorular Yüklenemedi</h3>
                    <p>Google Sheet soru listesi alınamadı. Lütfen koddaki 'tablonuzunGidKodu' alanının doğruluğunu kontrol edin.</p>
                `;
            }
        }

        function checkAnswer(qIndex, correctAnswer) {
            const selectedRadio = document.querySelector(`input[name="question-${qIndex}"]:checked`);
            const feedbackDiv = document.getElementById(`feedback-${qIndex}`);
            const container = document.getElementById(`options-q-${qIndex}`);
            const labels = container.querySelectorAll('.option-label');

            labels.forEach(label => {
                label.classList.remove('correct', 'incorrect');
            });

            if (!selectedRadio) {
                feedbackDiv.className = "result-feedback danger";
                feedbackDiv.innerText = "⚠️ Lütfen önce bir şık işaretleyin!";
                return;
            }

            const userAnswer = selectedRadio.value;

            labels.forEach(label => {
                const labelAns = label.getAttribute('data-ans');
                if (labelAns === correctAnswer) {
                    label.classList.add('correct');
                }
                if (userAnswer === labelAns && userAnswer !== correctAnswer) {
                    label.classList.add('incorrect');
                }
            });

            if (userAnswer === correctAnswer) {
                feedbackDiv.className = "result-feedback success";
                feedbackDiv.innerText = "🎉 Doğru Cevap!";
            } else {
                feedbackDiv.className = "result-feedback danger";
                feedbackDiv.innerText = `❌ Yanlış Cevap!`;
            }
        }

        window.onload = loadQuestions;
    </script>
</body>
</html>
